name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 并行 Job 1: 构建 Windows 安装包 ──
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # ── Rust toolchain ──
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Cache Rinf CLI
        id: cache-rinf
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/rinf.exe
          key: rinf-cli-${{ runner.os }}-8.9.0

      # ── Flutter SDK ──
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Rinf code generation ──
      - name: Install Rinf CLI
        if: steps.cache-rinf.outputs.cache-hit != 'true'
        run: cargo install rinf_cli@8.9.0

      - name: Generate Rinf bindings
        run: rinf gen

      # ── Build ──
      - name: Build Flutter Windows app
        run: flutter build windows --release --build-name=${{ steps.version.outputs.VERSION }} --build-number=1 --dart-define=APP_VERSION=${{ steps.version.outputs.VERSION }}

      # ── Inno Setup installer ──
      - name: Download Inno Setup Chinese Simplified language file
        shell: pwsh
        run: |
          $issLangDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile "$issLangDir\ChineseSimplified.isl"

      - name: Build installer with Inno Setup
        run: |
          iscc /DMyAppVersion=${{ steps.version.outputs.VERSION }} installer\windows\setup.iss

      # ── Compress portable version ──
      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "build\installer\FluxDown-${{ steps.version.outputs.VERSION }}-windows-portable.zip"

      # ── Upload artifacts（供 release job 使用）──
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/installer/FluxDown-*.exe

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: build/installer/FluxDown-*-portable.zip

  # ── 并行 Job 2: 构建浏览器扩展 ──
  build-extension:
    name: Build Browser Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set extension version from tag
        working-directory: fluxDown
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          sed -i "s/version: '.*'/version: '$VERSION'/" wxt.config.ts
          echo "Updated extension version to $VERSION"
          grep '"version"' package.json
          grep 'version:' wxt.config.ts

      - name: Install dependencies
        run: npm ci
        working-directory: fluxDown

      - name: Build Chrome extension
        run: npm run build
        working-directory: fluxDown

      - name: Build Firefox extension
        run: npm run build:firefox
        working-directory: fluxDown

      - name: Package extensions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p build/extension/FluxDown-${VERSION}-extension
          cp -r fluxDown/.output/chrome-mv3 build/extension/FluxDown-${VERSION}-extension/chrome
          cp -r fluxDown/.output/firefox-mv2 build/extension/FluxDown-${VERSION}-extension/firefox
          cd build/extension
          zip -r FluxDown-${VERSION}-extension.zip FluxDown-${VERSION}-extension/
          ls -la

      # ── Upload artifact（供 release job 使用）──
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension
          path: build/extension/FluxDown-*.zip
          if-no-files-found: error

  # ── 最终 Job: 等待所有构建完成后统一发布 Release ──
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-extension]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag message for release notes
        id: tag_message
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG_NAME" 2>/dev/null || echo "")
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="Release $TAG_NAME"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # ── 下载所有构建产物 ──
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/

      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: release-assets/

      - name: Download browser extension
        uses: actions/download-artifact@v4
        with:
          name: browser-extension
          path: release-assets/

      - name: List release assets
        run: ls -la release-assets/

      # ── 创建 Release 并上传所有文件 ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: ${{ steps.tag_message.outputs.body }}
          draft: false
